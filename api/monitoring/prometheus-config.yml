global:
  scrape_interval: 4s #scrape after every 4 seconds

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["10.10.18.81:3000"]

# to run graphana use the below command
# docker run -d -p 3001:3000 --name=grafana grafana/grafana
# docker run -d -p 3001:3000 --name grafana grafana/grafana-oss
# to run loki
# docker run -d --name=loki -p 3100:3100 grafana/loki
# Finding logs inside grafana : 
# go to builder(by default in code) then paste below query
# -all logs : {app="findyourhome-backend"}
# -error logs : {app="findyourhome-backend", level="error"}