version: "3"

services:
  prom-server:
    image: prom/prometheus
    ports:
      - 9090:9090
    volumes:
      - ./prometheus-config.yml:/etc/prometheus/prometheus.yml

# for running graphana : docker run -d -p 3000:3000 --name=grafana grafana/grafana-oss
# for log collection : docker run -d --name=loki -p 3100:3100 grafana/loki